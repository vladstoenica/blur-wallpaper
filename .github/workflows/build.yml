name: Build Android APK

# This allows you to manually trigger the build from the GitHub UI
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # Java 17 is standard for modern Android. Change to '11' for older projects.
          java-version: '17' 

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          # This is the default path where Android Studio/Gradle outputs the APK
          path: app/build/outputs/apk/debug/*.apk
